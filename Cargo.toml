[package]
name = "moonproto"
version = "0.1.0"
edition = "2021"

[dependencies]
moonproto-transport = { path = "../moonproto-transport" }
aes-gcm = "0.10"
sha3 = "0.10"
rand = "0.8"
base64 = "0.22"
flate2 = "1"
socket2 = "0.5"
log = "0.4"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[[example]]
name = "client_test"
path = "examples/client_test.rs"
