<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560">
  <title id="title">MoonProto architecture flow diagram</title>
  <desc id="desc">A vertical flow diagram showing trading UI, MoonProto Rust library, MoonBot core, and exchange accounts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1020" />
      <stop offset="1" stop-color="#141a33" />
    </linearGradient>
    <filter id="glow" x="-18%" y="-70%" width="136%" height="240%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="9" result="blur" />
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.356 0 0 0 0 0.498 0 0 0 0 1 0 0 0 0.55 0" result="color" />
      <feMerge>
        <feMergeNode in="color" />
      </feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 6 6" markerWidth="6" markerHeight="6" refX="5.2" refY="3" orient="auto">
      <path d="M1 1l4 2-4 2z" fill="#5B7FFF" />
    </marker>
    <clipPath id="moonprotoClip">
      <rect x="90" y="168" width="720" height="104" rx="14" ry="14" />
    </clipPath>
  </defs>

  <rect x="0.5" y="0.5" width="899" height="559" rx="18" fill="url(#bg)" stroke="#2A335C" />
  <g font-family="Segoe UI, Inter, system-ui, sans-serif" text-anchor="middle">
    <g>
      <rect x="150" y="50" width="600" height="86" rx="14" fill="#171E3B" stroke="#3A4785" />
      <text x="450" y="83" fill="#EAEEFF" font-size="18" font-weight="600">Your trading UI · dashboard · control tool</text>
      <text x="450" y="109" fill="#8E97C4" font-size="12.5">UI + product logic</text>
    </g>

    <g stroke="#5B7FFF" stroke-width="1.6" stroke-linecap="round" fill="none" marker-end="url(#arrow)">
      <path d="M450 146v14" />
      <path d="M450 282v14" />
      <path d="M450 400v14" />
    </g>

    <g>
      <rect x="90" y="168" width="720" height="104" rx="14" fill="#5B7FFF" opacity="0.28" filter="url(#glow)" />
      <rect x="90" y="168" width="720" height="104" rx="14" fill="#171E3B" stroke="#5B7FFF" />
      <g clip-path="url(#moonprotoClip)">
        <rect x="90" y="168" width="5" height="104" fill="#5B7FFF" />
      </g>
      <text x="450" y="207" fill="#EAEEFF" font-size="18" font-weight="600">MoonProto — Rust library</text>
      <text x="450" y="234" fill="#8E97C4" font-size="12">transport · auth · reconnect · subscriptions · retained state · events · typed intents</text>
    </g>

    <g>
      <rect x="150" y="304" width="600" height="86" rx="14" fill="#171E3B" stroke="#3A4785" />
      <text x="450" y="337" fill="#EAEEFF" font-size="18" font-weight="600">MoonBot core (MoonProto enabled)</text>
      <text x="450" y="363" fill="#8E97C4" font-size="12.5">the execution engine</text>
    </g>

    <g>
      <rect x="150" y="422" width="600" height="86" rx="14" fill="#171E3B" stroke="#3A4785" />
      <text x="450" y="465" fill="#EAEEFF" font-size="18" font-weight="600">Exchange accounts · orders · strategies · balances</text>
    </g>
  </g>
</svg>
